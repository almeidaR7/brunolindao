<!DOCTYPE html>
<html lang="pt-br">

-----------COMEÇO ESTILO CSS-----------

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruno Shida</title>


    <style>
    /* Reset básico */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    /* Header */
    header {
        background-color: #111;
        padding: 20px;
    }
    
    /* Menu */
    .menu {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    
    /* Título */
    .menu h1 {
        color: #ffcc00;
        font-size: 24px;
        font-family: Arial, sans-serif;
    }
    
    /* Lista */
    .menu ul {
        display: flex;
        list-style: none;
        gap: 20px;
    }
    
    /* Links */
    .menu a {
        text-decoration: none;
        color: white;
        font-family: Arial, sans-serif;
        transition: 0.3s;
    }
    
    /* Hover */
    .menu a:hover {
        color: #ffcc00;
    }
</style>
</head>


-----------FIM DO ESTILO CSS-----------



-----------COMEÇO HTML-----------

<body>
    <div class="container">
        <header>
            <nav class="menu">
                <h1>Neymar Não Joga Nada</h1>
        
                <ul>
                    <li><a href="#">Início</a></li>
                    <li><a href="#">Dribles Inúteis</a></li>
                    <li><a href="#">Lesões</a></li>
                    <li><a href="#">Rolês Aleatórios</a></li>
                    <li><a href="#">Compilações no TikTok</a></li>
                </ul>
            </nav>
        </header>
        <section>

        </section>
        <footer>
            <p>Bruno Shida</p>
        </footer>
    </div>
    
</body>
</html>
